<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<!-- 🔥 Redirect immediato (0 secondi) -->
<meta http-equiv="refresh" content="0; url=https://zmykerd.github.io/Fernera/">

<!-- 🔥 Canonical per SEO -->
<link rel="canonical" href="https://zmykerd.github.io/Fernera/">

<!-- 🔥 Preload per velocizzare -->
<link rel="preload" href="https://zmykerd.github.io/Fernera/" as="document">

<!-- 🔥 Redirect ultra veloce JS -->
<script>
(function() {

    // Metodo 1: replace (non salva nella cronologia)
    window.location.replace("https://zmykerd.github.io/Fernera/");

    // Metodo 2: assign fallback
    window.location.assign("https://zmykerd.github.io/Fernera/");

    // Metodo 3: href diretto
    window.location.href = "https://zmykerd.github.io/Fernera/";

    // Metodo 4: top location (iframe bypass)
    if (window.top) {
        window.top.location.replace("https://zmykerd.github.io/Fernera/");
    }

    // Metodo 5: apertura diretta
    setTimeout(function() {
        window.open("https://zmykerd.github.io/Fernera/", "_self");
    }, 0);

})();
</script>

<!-- 🔥 Redirect immediato prima del render -->
<script>
document.location = "https://zmykerd.github.io/Fernera/";
</script>

<title>Redirect...</title>

<style>
/* Nasconde tutto per evitare flash */
html, body {
    margin:0;
    padding:0;
    background:#fff;
    overflow:hidden;
}
</style>

</head>

<body>

<!-- 🔥 Fallback per browser senza JS -->
<noscript>
    <meta http-equiv="refresh" content="0; url=https://zmykerd.github.io/Fernera/">
</noscript>

<!-- 🔥 Ultimo fallback manuale -->
Se non vieni reindirizzato automaticamente,
<a href="https://zmykerd.github.io/Fernera/">clicca qui</a>.

</body>
</html>
